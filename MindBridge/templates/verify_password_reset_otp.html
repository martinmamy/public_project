{% extends "base.html" %}
{% load static %}

{% block title %}Verify OTP{% endblock %}

{% block content %}

<div class="otp-container">

    <div class="otp-card">

        <div class="otp-header">

            <div class="otp-icon">
                <i class="fa-solid fa-shield-halved"></i>
            </div>

            <h2>Verify Your Code</h2>

            <p>We sent a 6-digit code to your email</p>

        </div>

        <form method="post" class="otp-form">
            {% csrf_token %}

            <div class="otp-boxes">

                {% for i in "123456" %}
                <input type="text" maxlength="1" class="otp-input" />
                {% endfor %}

            </div>

            <!-- hidden real input -->
            <input type="hidden" name="otp" id="otp-value">

            <button type="submit" class="otp-btn">
                Verify Code
            </button>

        </form>

        <div class="otp-footer">

            <p id="timerText">Resend code in <span id="timer">60</span>s</p>

            <button type="button" class="resend-btn" id="resendBtn" disabled>
                Resend Code
            </button>

        </div>

    </div>

</div>

<style>

/* =========================
   BACKGROUND
========================= */
.otp-container {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;

    background: radial-gradient(circle at top left, #dbeafe, transparent 40%),
                radial-gradient(circle at bottom right, #e0e7ff, transparent 40%),
                linear-gradient(135deg, #f8fafc, #eef2ff);

    font-family: system-ui, sans-serif;
}

/* =========================
   CARD
========================= */
.otp-card {
    width: 100%;
    max-width: 520px;

    background: rgba(255,255,255,0.8);
    backdrop-filter: blur(18px);

    border-radius: 28px;
    padding: 40px;

    text-align: center;

    box-shadow: 0 20px 60px rgba(0,0,0,0.08);
}

/* HEADER */
.otp-icon {
    font-size: 42px;
    color: #2563eb;
    margin-bottom: 10px;
}

.otp-header h2 {
    margin: 0;
    font-size: 24px;
    font-weight: 700;
}

.otp-header p {
    color: #6b7280;
    margin-top: 8px;
}

/* OTP BOXES */
.otp-boxes {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin: 25px 0;
}

.otp-input {
    width: 48px;
    height: 56px;

    text-align: center;
    font-size: 22px;
    font-weight: 700;

    border-radius: 12px;
    border: 1px solid #d1d5db;

    outline: none;

    transition: 0.2s ease;
}

.otp-input:focus {
    border-color: #6366f1;
    box-shadow: 0 0 0 4px rgba(99,102,241,0.15);
}

/* BUTTON */
.otp-btn {
    width: 100%;
    padding: 14px;

    border: none;
    border-radius: 14px;

    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: white;

    font-weight: 600;
    cursor: pointer;

    transition: 0.2s ease;
}

.otp-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 25px rgba(99,102,241,0.25);
}

/* FOOTER */
.otp-footer {
    margin-top: 20px;
    font-size: 14px;
    color: #6b7280;
}

.resend-btn {
    margin-top: 8px;
    background: none;
    border: none;
    color: #4f46e5;
    font-weight: 600;
    cursor: pointer;
}

.resend-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

</style>

<script>

/* =========================
   OTP INPUT LOGIC
========================= */
const inputs = document.querySelectorAll(".otp-input");
const hidden = document.getElementById("otp-value");

inputs.forEach((input, idx) => {

    input.addEventListener("input", (e) => {

        const value = e.target.value;

        if (value && idx < inputs.length - 1) {
            inputs[idx + 1].focus();
        }

        updateOTP();

    });

    input.addEventListener("keydown", (e) => {

        if (e.key === "Backspace" && !input.value && idx > 0) {
            inputs[idx - 1].focus();
        }

    });

});

/* PASTE SUPPORT */
inputs[0].addEventListener("paste", (e) => {

    const paste = (e.clipboardData || window.clipboardData).getData("text");

    if (paste.length === 6) {

        inputs.forEach((inp, i) => {
            inp.value = paste[i] || "";
        });

        updateOTP();
    }

});

/* BUILD OTP */
function updateOTP() {
    let otp = "";
    inputs.forEach(i => otp += i.value);
    hidden.value = otp;
}

/* =========================
   RESEND TIMER
========================= */
let time = 60;
const timer = document.getElementById("timer");
const btn = document.getElementById("resendBtn");

const interval = setInterval(() => {

    time--;
    timer.textContent = time;

    if (time <= 0) {
        clearInterval(interval);
        btn.disabled = false;
        document.getElementById("timerText").textContent = "You can resend now";
    }

}, 1000);

</script>

{% endblock %}
