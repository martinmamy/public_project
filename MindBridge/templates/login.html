{% extends "base.html" %}
{% block title %}Login | Fancylearn{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">

        <div class="card shadow-sm border-0 p-4">
            <h3 class="text-center mb-4 fw-bold">Login</h3>

            <form method="post" id="loginForm">
                {% csrf_token %}

                <!-- Username -->
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    {{ form.username }}
                </div>

                <!-- Password -->
                <div class="mb-3">
                    <label class="form-label">Password</label>

                    <div class="input-group password-group">
                        {{ form.password }}

                        <button 
                            class="btn btn-outline-secondary toggle-password"
                            type="button"
                            id="togglePassword"
                        >
                            <i class="fa fa-eye"></i>
                        </button>
                    </div>

                </div>

                <button type="submit" class="btn btn-success w-100">
                    Login
                </button>

            </form>

            <p class="mt-3 text-center">
                Don't have an account?
                <a href="{% url 'register' %}">Register</a>
            </p>

        </div>

    </div>
</div>
{% endblock %}


{% block extra_scripts %}
<script>

const togglePassword = document.querySelector("#togglePassword");
const passwordField = document.querySelector("#id_password");

togglePassword.addEventListener("click", function () {

    const type = passwordField.getAttribute("type") === "password"
        ? "text"
        : "password";

    passwordField.setAttribute("type", type);

    this.innerHTML = type === "password"
        ? '<i class="fa fa-eye"></i>'
        : '<i class="fa fa-eye-slash"></i>';
});

</script>

<style>
/* =========================
LOGIN FORM STYLING
========================= */

/* Card & Background */
.card {
    backdrop-filter: blur(12px);
    border: none;
    transition: transform 0.2s ease, box-shadow 0.25s ease;
}
.card:hover {
    transform: translateY(-3px);
    box-shadow: 0 15px 30px rgba(0,0,0,0.08);
}

/* Inputs */
.form-control {
    border: 1px solid var(--border);
    padding: 12px 15px;
    transition: all 0.2s ease;
}
.form-control:focus {
    border-color: var(--primary);
    box-shadow: 0 0 8px rgba(92,106,196,0.3);
    outline: none;
}

/* Password toggle button */
.password-group {
    display: flex;
}
.password-group input {
    flex: 1;
    border-right: 0;
}
.password-group button {
    border-left: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--hover);
    color: var(--muted);
    transition: background 0.2s ease, color 0.2s ease;
}
.password-group button:hover {
    background: var(--primary-soft);
    color: var(--primary);
}
.toggle-password i {
    font-size: 16px;
}

/* Links */
a {
    transition: color 0.2s ease;
}
a:hover {
    color: var(--primary-soft);
}

/* Dark mode support */
[data-theme="dark"] .card {
    background: var(--card);
}
[data-theme="dark"] .form-control {
    background: var(--input-bg);
    color: var(--text);
    border: 1px solid var(--input-border);
}
[data-theme="dark"] .form-control::placeholder {
    color: var(--muted);
}
[data-theme="dark"] .password-group button {
    background: var(--hover);
    color: var(--muted);
}
[data-theme="dark"] a {
    color: var(--primary);
}
[data-theme="dark"] a:hover {
    color: var(--primary-soft);
}

</style>

{% endblock %}
