{% extends "base.html" %}

{% block content %}

<div class="container py-4 py-md-5">

    <div class="row justify-content-center">
        <div class="col-12 col-lg-10 col-xl-8">

            <!-- HEADER -->
            <div class="text-center mb-4 mb-md-5 px-2">

                <h1 class="fw-bold text-info display-6 display-md-5">
                    Go Premium
                </h1>

                <p class="text-muted fs-6 fs-md-5 mt-3">
                    Unlock full platform access, premium tools, and exclusive features.
                </p>

            </div>

            <!-- CARD WRAPPER -->
            <div class="card border-0 rounded-4">

                <div class="card-body p-3 p-md-5">

                    <form method="POST" action="{% url 'create-subscription' %}">
                        {% csrf_token %}

                        <!-- PLANS GRID -->
                        <div class="row g-3 g-md-4">

                            <!-- MONTHLY -->
                            <div class="col-12 col-md-6">

                                <input
                                    type="radio"
                                    id="monthly"
                                    name="plan"
                                    value="monthly"
                                    class="plan-radio"
                                    checked
                                >

                                <label for="monthly" class="plan-card">

                                    <div class="plan-header">
                                        <h4 class="fw-bold mb-1">Monthly</h4>
                                        <span class="text-muted small">Flexible plan</span>
                                    </div>

                                    <div class="plan-price">
                                        ${{ monthly_price }}
                                    </div>

                                    <div class="plan-period text-muted small">
                                        per month
                                    </div>

                                    <ul class="plan-features">
                                        <li>Full feature access</li>
                                        <li>Priority performance</li>
                                        <li>Advanced tools</li>
                                        <li>Cancel anytime</li>
                                    </ul>

                                    <div class="plan-badge">
                                        Most flexible
                                    </div>

                                </label>

                            </div>

                            <!-- YEARLY -->
                            <div class="col-12 col-md-6">

                                <input
                                    type="radio"
                                    id="yearly"
                                    name="plan"
                                    value="yearly"
                                    class="plan-radio"
                                >

                                <label for="yearly" class="plan-card premium">

                                    <div class="plan-header">
                                        <h4 class="fw-bold mb-1">Yearly</h4>
                                        <span class="text-muted small">Best value</span>
                                    </div>

                                    <div class="plan-price">
                                        ${{ yearly_price }}
                                    </div>

                                    <div class="plan-period text-muted small">
                                        per year
                                    </div>

                                    <ul class="plan-features">
                                        <li>Everything in Monthly</li>
                                        <li>Priority updates</li>
                                        <li>Premium-only features</li>
                                        <li>Biggest savings</li>
                                    </ul>

                                    <div class="plan-badge premium-badge">
                                        Save more
                                    </div>

                                </label>

                            </div>

                        </div>

                        <!-- PAYPAL INFO -->
                        <div class="mt-4 mt-md-5 p-3 p-md-4 bg-light border rounded-4 d-flex flex-column flex-md-row align-items-start align-items-md-center gap-3">

                            <img
                                src="https://www.paypalobjects.com/webstatic/mktg/logo/pp_cc_mark_111x69.jpg"
                                width="70"
                                class="img-fluid"
                                alt="PayPal"
                            >

                            <div>
                                <strong class="d-block">
                                    Secure recurring billing via PayPal
                                </strong>
                                <div class="text-muted small">
                                    You will be redirected to PayPal to approve your subscription.
                                </div>
                            </div>

                        </div>

                        <!-- BUTTON -->
                        <div class="d-grid mt-4">

                            <button
                                type="submit"
                                class="btn btn-primary btn-lg rounded-pill py-2 py-md-3 fw-semibold"
                            >
                                Continue to PayPal
                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>
    </div>

</div>

<!-- STYLES -->

<style>

/* RADIO */
.plan-radio {
    display: none;
}

/* CARD BASE */
.plan-card {
    display: block;
    padding: 22px;
    border-radius: 18px;
    border: 2px solid #e9ecef;
    cursor: pointer;
    transition: all 0.25s ease;
    height: 100%;
    position: relative;
    background: #fff;
}

/* MOBILE OPTIMIZATION */
@media (max-width: 576px) {
    .plan-card {
        padding: 18px;
    }

    .plan-price {
        font-size: 34px;
    }
}

/* HOVER */
.plan-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 25px rgba(0,0,0,0.08);
}

/* HEADER */
.plan-header {
    margin-bottom: 14px;
}

/* PRICE */
.plan-price {
    font-size: 40px;
    font-weight: 800;
    margin-bottom: 4px;
}

/* FEATURES */
.plan-features {
    list-style: none;
    padding: 0;
    margin-top: 12px;
}

.plan-features li {
    padding: 5px 0;
    color: #555;
    font-size: 14px;
}

/* BADGES */
.plan-badge {
    position: absolute;
    top: 14px;
    right: 14px;
    font-size: 11px;
    padding: 5px 9px;
    background: #eef2ff;
    border-radius: 999px;
    color: #4f46e5;
    font-weight: 600;
}

.premium-badge {
    background: #0d6efd;
    color: white;
}

/* PREMIUM CARD */
.premium {
    border-color: #7edbe7;
}

/* SELECTED STATE */
.plan-radio:checked + .plan-card {
    border-color: #0d6efd;
    box-shadow: 0 0 0 6px rgba(13,110,253,0.15);
    transform: translateY(-3px);
}

/* RESPONSIVE GRID IMPROVEMENT */
@media (max-width: 768px) {
    .plan-card {
        text-align: left;
    }
}

</style>

{% endblock %}
