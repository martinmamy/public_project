{% extends "base.html" %}

{% block content %}

<div class="container py-5">

  <div class="row justify-content-center">
    <div class="col-md-6">

      <div class="card shadow-sm border-0 text-center p-4">

        <div class="mb-4">
          <i class="fa fa-times-circle text-danger fa-4x"></i>
        </div>

        <h4 class="mb-3">PayPal Connection Failed</h4>

        <p class="text-muted">
          We couldn't link your PayPal account.  
          This may happen if the authorization expired or the request was cancelled.
        </p>

        <div class="mt-4">

          <a href="{% url 'link_paypal_account' %}" class="btn btn-danger">
            <i class="fa fa-redo me-1"></i>
            Try Again
          </a>

          <a href="/" class="btn btn-outline-secondary">
            <i class="fa fa-home me-1"></i>
            Return to Home
          </a>

        </div>

      </div>

    </div>
  </div>

</div>

{% endblock %}
