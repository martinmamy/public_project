{% extends "base.html" %}

{% block content %}

<div class="container py-5">

  <div class="row justify-content-center">
    <div class="col-md-6">

      <div class="card shadow-sm border-0 text-center p-4">

        <div class="mb-4">
          <i class="fa fa-check-circle text-success fa-4x"></i>
        </div>

        <h4 class="mb-3">PayPal Account Linked Successfully</h4>

        <p class="text-muted">
          Your PayPal account has been connected successfully.  
          You can now receive tips, bounties, and payments on the platform.
        </p>

        <div class="mt-4">

          <a href="/" class="btn btn-primary">
            <i class="fa fa-home me-1"></i>
            Go to Dashboard
          </a>

          <a href="{% url 'link_payment_account' %}" class="btn btn-outline-secondary">
            <i class="fa fa-wallet me-1"></i>
            View Payment Settings
          </a>

        </div>

      </div>

    </div>
  </div>

</div>

{% endblock %}
