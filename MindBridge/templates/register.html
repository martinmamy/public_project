{% extends "base.html" %}
{% block title %}Register | Fancylearn{% endblock %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-5">

    <div class="card shadow-sm border-0 p-4">
        <h3 class="text-center mb-4 fw-bold">Register</h3>

        <form method="post">
            {% csrf_token %}

            <!-- Username -->
            <div class="mb-3">
                <label class="form-label">Username</label>
                {{ form.username }}
            </div>

            <!-- Email -->
            <div class="mb-3">
                <label class="form-label">Email</label>
                {{ form.email }}
            </div>

            <!-- Password -->
            <div class="mb-3">
                <label class="form-label">Password</label>

                <div class="input-group">
                    {{ form.password1 }}
                    <button class="btn btn-outline-secondary d-flex align-items-center justify-content-center"
                            type="button"
                            id="togglePassword1">
                        <i class="fa fa-eye"></i>
                    </button>
                </div>
            </div>

            <!-- Confirm Password -->
            <div class="mb-3">
                <label class="form-label">Confirm Password</label>

                <div class="input-group">
                    {{ form.password2 }}
                    <button class="btn btn-outline-secondary d-flex align-items-center justify-content-center"
                            type="button"
                            id="togglePassword2">
                        <i class="fa fa-eye"></i>
                    </button>
                </div>
            </div>

            <!-- Register Button -->
            <button type="submit" class="btn btn-primary w-100">
                Register
            </button>

        </form>

        <p class="mt-3 text-center">
            Already have an account?
            <a href="{% url 'login' %}">Login</a>
        </p>

    </div>

</div>

</div>
{% endblock %}

{% block extra_scripts %}

<script>

// Toggle password 1
const togglePassword1 = document.querySelector("#togglePassword1");
const password1 = document.querySelector("#id_password1");

togglePassword1.addEventListener("click", function () {

    const type = password1.getAttribute("type") === "password" ? "text" : "password";
    password1.setAttribute("type", type);

    this.innerHTML = type === "password"
        ? '<i class="fa fa-eye"></i>'
        : '<i class="fa fa-eye-slash"></i>';
});


// Toggle password 2
const togglePassword2 = document.querySelector("#togglePassword2");
const password2 = document.querySelector("#id_password2");

togglePassword2.addEventListener("click", function () {

    const type = password2.getAttribute("type") === "password" ? "text" : "password";
    password2.setAttribute("type", type);

    this.innerHTML = type === "password"
        ? '<i class="fa fa-eye"></i>'
        : '<i class="fa fa-eye-slash"></i>';
});

</script>
<style>
/* =========================
LOGIN FORM STYLING
========================= */

/* Card & Background */
.card {
    backdrop-filter: blur(12px);
    border: none;
    transition: transform 0.2s ease, box-shadow 0.25s ease;
}
.card:hover {
    transform: translateY(-3px);
    box-shadow: 0 15px 30px rgba(0,0,0,0.08);
}

/* Inputs */
.form-control {
    border: 1px solid var(--border);
    padding: 12px 15px;
    transition: all 0.2s ease;
}
.form-control:focus {
    border-color: var(--primary);
    box-shadow: 0 0 8px rgba(92,106,196,0.3);
    outline: none;
}

/* Password toggle button */
.password-group {
    display: flex;
}
.password-group input {
    flex: 1;
    border-right: 0;
}
.password-group button {
    border-left: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--hover);
    color: var(--muted);
    transition: background 0.2s ease, color 0.2s ease;
}
.password-group button:hover {
    background: var(--primary-soft);
    color: var(--primary);
}
.toggle-password i {
    font-size: 16px;
}

/* Links */
a {
    transition: color 0.2s ease;
}
a:hover {
    color: var(--primary-soft);
}

/* Dark mode support */
[data-theme="dark"] .card {
    background: var(--card);
}
[data-theme="dark"] .form-control {
    background: var(--input-bg);
    color: var(--text);
    border: 1px solid var(--input-border);
}
[data-theme="dark"] .form-control::placeholder {
    color: var(--muted);
}
[data-theme="dark"] .password-group button {
    background: var(--hover);
    color: var(--muted);
}
[data-theme="dark"] a {
    color: var(--primary);
}
[data-theme="dark"] a:hover {
    color: var(--primary-soft);
}

</style>
{% endblock %}
