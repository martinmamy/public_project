{% with profile=user.profile %}

<label class="user-presence status-{{ profile.availability_status|default:'offline' }}">
    
    <!-- TOGGLE (mobile only) -->
    <input type="checkbox" class="presence-toggle" hidden>

    <!-- DOT -->
    <span class="presence-dot"
        title="
    {% if profile.availability_status == 'online' %}
    🟢 Available now
    {% elif profile.availability_status == 'later' %}
    🟡 Available later
    {% else %}
    🔴 Offline
    {% endif %}
    Mode: {{ profile.get_availability_mode_display }}
    {% if profile.availability_reason %}
    Reason: {{ profile.get_availability_reason_display }}
    {% endif %}
    Profession: {{ profile.profession|default:'Not specified' }}">
    </span>


    <!-- BACKDROP (mobile) -->
    <span class="presence-backdrop"></span>
    
    <!-- POPUP (mobile) -->
    <span class="presence-popup">

        <div class="presence-line">
            {% if profile.availability_status == 'online' %}
                🟢 <strong>Available now</strong>
            {% elif profile.availability_status == 'later' %}
                🟡 <strong>Available later</strong>
            {% else %}
                🔴 <strong>Offline</strong>
            {% endif %}
        </div>
        
        <div class="presence-line">
            <span class="label">Mode:</span>
            <span class="value">{{ profile.get_availability_mode_display }}</span>
        </div>

        {% if profile.availability_reason %}
        <div class="presence-line">
            <span class="label">Reason:</span>
            <span class="value">{{ profile.get_availability_reason_display }}</span>
        </div>
        {% endif %}

        <div class="presence-line">
            <span class="label">Profession:</span>
            <span class="value">{{ profile.profession|default:'Not specified' }}</span>
        </div>

    </span>

</label>

{% endwith %}

<style>

.verified-badge{
    display:inline-flex;
    align-items:center;
    justify-content:center;

    margin-left:4px;
    font-size:12px;

    cursor:help;
    transition:transform 0.2s ease;
}

.verified-badge:hover{
    transform:scale(1.2);
}

/* =========================
   WRAPPER
========================= */
.user-presence{
    position:relative;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    cursor:help;
}

/* =========================
   DOT (SINGLE SOURCE OF TRUTH)
========================= */
.presence-dot{
    width:8px;
    height:8px;
    border-radius:50%;
    display:inline-block;
    flex:0 0 8px;
    transition: transform 0.15s ease;
}

/* hover micro interaction */
.user-presence:hover .presence-dot{
    transform: scale(1.25);
}

/* =========================
   STATUS COLORS
========================= */
.status-online .presence-dot{
    background:#22c55e;
    box-shadow:0 0 8px rgba(34,197,94,0.5);
    animation:pulse 1.8s infinite;
}

.status-later .presence-dot{
    background:#facc15;
    box-shadow:0 0 6px rgba(250,204,21,0.4);
}

.status-offline .presence-dot{
    background:#ef4444;
    box-shadow:0 0 6px rgba(239,68,68,0.3);
}

/* =========================
   MOBILE POPUP
========================= */
.presence-backdrop{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.45);
    z-index:99990;
}

.presence-popup{
    display:none;
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);

    width:90%;
    max-width:340px;

    background:#111827;
    color:#fff;
    padding:16px;
    border-radius:12px;

    box-shadow:0 25px 60px rgba(0,0,0,0.5);
    z-index:99999;
}

/* toggle logic */
.presence-toggle:checked ~ .presence-popup{
    display:block;
}

.presence-toggle:checked ~ .presence-backdrop{
    display:block;
}

/* =========================
   TEXT
========================= */
.presence-line{
    margin-bottom:6px;
    font-size:14px;
}

.label{
    font-weight:600;
    opacity:0.7;
    margin-right:4px;
}

.value{
    opacity:1;
}

/* =========================
   DESKTOP ONLY BEHAVIOR
========================= */
@media (min-width:769px){

    .presence-popup,
    .presence-backdrop,
    .presence-toggle{
        display:none !important;
    }

}

/* =========================
   PULSE ANIMATION
========================= */
@keyframes pulse{
    0%{ box-shadow:0 0 0 0 rgba(34,197,94,0.6); }
    70%{ box-shadow:0 0 0 6px rgba(34,197,94,0); }
    100%{ box-shadow:0 0 0 0 rgba(34,197,94,0); }
}

</style>
