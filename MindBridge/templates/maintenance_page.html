<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Maintenance Mode</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 600px;
            padding: 40px;
            background: #1e293b;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.1rem;
            color: #cbd5e1;
            line-height: 1.6;
        }

        .icon {
            font-size: 60px;
            margin-bottom: 20px;
        }

        .status {
            margin-top: 20px;
            display: inline-block;
            padding: 6px 14px;
            background: #f59e0b;
            color: #111827;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .footer {
            margin-top: 25px;
            font-size: 0.85rem;
            color: #94a3b8;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="icon">🛠️</div>

    <h1>We’ll be back soon</h1>

    <p>
        We are currently performing scheduled maintenance to improve your experience.
        <br>
        Please check back shortly.
    </p>

    <div class="status">Maintenance Mode Active</div>

    <div class="footer">
        Thank you for your patience.
    </div>
</div>

</body>
</html>
