name: Summarize new issues

on:
  issues:
    types: [opened]

jobs:
  summary:
    runs-on: self-hosted

    permissions:
      issues: write
      models: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run AI inference
        id: inference
        uses: actions/ai-inference@v1
        with:
          prompt: |
            You are summarizing an issue.
            Title: ${{ github.event.issue.title }}
            Body: ${{ github.event.issue.body }}

      - name: Debug output
        shell: pwsh
        run: |
          Write-Host "Response:"
          Write-Host $env:RESPONSE
        env:
          RESPONSE: ${{ steps.inference.outputs.response }}
